<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java User Group - Meetup-site-java</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <div class="page-sheet">
    <header>
        <nav class="container" aria-label="Main navigation">
            <a href="/" class="logo">JUG Colonia</a>
            <ul>
                <li><a href="#upcoming">Upcoming</a></li>
                <li><a href="#past">Archive</a></li>
            </ul>
        </nav>
    </header>

    <main class="container" id="main-content">
        <section id="upcoming" aria-labelledby="upcoming-heading">
            <h2 id="upcoming-heading">Upcoming Meetups</h2>
            <div class="meetup-grid" id="upcoming-container" aria-live="polite"></div>
        </section>


        <section id="past" aria-labelledby="past-heading">
            <h2 id="past-heading">Past Meetups</h2>
            <div class="meetup-grid" id="past-container" aria-live="polite"></div>
        </section>
    </main>

    <footer class="container">
        <small>Inspired Socials</small>
    </footer>

    </div>

    <script src="js/main.js"></script>
</body>
</html>
