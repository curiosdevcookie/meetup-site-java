<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java User Group - Meetup-site-java</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <div class="page-sheet">
    <header>
        <nav class="container" aria-label="Main navigation">
            <a href="/" class="logo">
                <img src="assets/logos/jug_colonia_logo_temple.png" alt="JUG Colonia Logo">
            </a>
            <ul>
                <li><a href="#upcoming">Upcoming</a></li>
                <li><a href="#past">Past</a></li>
            </ul>
        </nav>
    </header>

    <main class="container" id="main-content">
        <section id="upcoming" aria-labelledby="upcoming-heading">
            <h2 id="upcoming-heading">Upcoming Meetups</h2>
            <div id="upcoming-container" aria-live="polite"></div>
        </section>

        <section id="past" aria-labelledby="past-heading">
            <h2 id="past-heading">Past Meetups</h2>
            <div id="past-container" aria-live="polite"></div>
        </section>
    </main>

    <footer class="container">
        <small>Inspired Socials</small>
    </footer>

    </div>

    <script src="js/main.js"></script>
</body>
</html>
